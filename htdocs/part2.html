<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset='utf-8' />
  <title>（実験・演習用）</title>
  <link rel="stylesheet" type="text/css" href="part2.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ページ全体にスクロールできるようにする */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .main {
      text-align: center;
      margin-bottom: 20px; /* コンテンツ下部に余白を追加 */
    }
    /* タイトルのスタイル */
    .section-title {
      font-size: 32px; /* フォントサイズを大きく */
      margin: 10px 0; /* 上下に余白を追加 */
      color: orange; /* 文字色をオレンジに */
      padding: 10px; /* パディングを追加 */
      background-color: white; /* 背景色を白に */
      border: 2px solid white; /* 枠線を白に */
      display: inline-block; /* タイトルの周りに余白を持たせるための設定 */
    }

    /* 画像を横に並べるためのスタイル */
    .image-container {
      display: flex;
      justify-content: center; /* 画像を中央揃えにする */
      gap: 20px; /* 画像の間に余白を追加 */
      margin-bottom: 20px; /* 画像の下部に余白を追加 */
    }

    /* 表のスタイル */
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto; /* 表を中央揃えにするためのスタイル */
    }

    th,
    td {
      border: 1px solid black;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background-color: #333;
      color: white;
      position: relative;
    }
  </style>
</head>

<body>

  <div class="class">
    <h1>津田沼駅東側エリア</h1>
  </div>

  <div class="main">
    <div class="info">
      <div class="section-title">ゆずカフェ</div> <!-- 追加されたタイトル -->
      
      <!-- 画像を横に並べるコンテナ -->
      <div class="image-container">
        <!-- 画像1 -->
        <img src="IMG_9604.jpg" alt="説明文" width="400" height="500">
        <!-- 画像2 -->
        <img src="IMG_9610.jpg" alt="説明文" width="400" height="500">
      </div>
      
      <!-- 表の作成 -->
      <table>
        <tbody>
          <tr>
            <td>営業時間</td>
            <td>水木金土日 10:00~17:00</td>
          </tr>
          <tr>
            <td>住所</td>
            <td><a href="https://maps.app.goo.gl/iw1JVAoDpwxxVSjw7">千葉県船橋市前原東3-5-10</a></td> <!-- リンクを追加 --></td>
          </tr>
          <tr>
            <td>アクセス</td>
            <td>津田沼駅北口徒歩8分</td>
          </tr>
          <tr>
            <td>電話番号</td>
            <td>090-9153-9057</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    <span class="letter">©松田研究室 B班</span>
  </div>

</body>

</html>
