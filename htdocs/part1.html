<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Magazine Layout</title>

    <link rel="stylesheet" href="main.css">

</head>

<body>

    <div class="container">

        <!-- First Section -->

        <div class="section">

            <div class="section-left">

                <img src="acai-bowl.jpg" alt="Acai Bowl">

            </div>

            <div class="section-right">

                <h2>　タイムズレンタカー</h2>

                <p>Category: Acai</p>

                <p>ブラジルのサンゴの植物から採れる栄養の果実です。</p>

                <p>Swami's Cafe<br>千葉県習志野市谷津7-7</p>

            </div>

        </div>




        <!-- Second Section -->

        <div class="section">

            <div class="section-left">

                <img src="clam-chowder.jpg" alt="Clam Chowder in a Bread Bowl">

            </div>

            <div class="section-right">

                <h2>グリーンマーケットMOA(エムオーエー）津田沼店</h2>

                <p>Category: Chowder Bowl</p>

                <p>自然派のお店。店主さんも気さくで素敵です。　　津田沼駅から226ｍ</p>

                <p>千葉県習志野市谷津7-7-50<br>Beach Street & The Embarcadero, San Francisco, CA 94133</p>

            </div>

        </div>

    </div>

</body>




</html>
