<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset='utf-8' />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="part4.css">
</head>

<body>

  <div class="team">
    <h1>津田沼ビート</h1>
  </div>

  <!-- Shop 1 Section -->
  <div class="big_shop1">
    <div class="shop1">
      <h2>無印良品</h2>
    </div>

    <div class="carousel" id="carousel1">
      <div class="slide active"><img src="iimage1.jpg" alt="Image 1"></div>
      <div class="slide"><img src="iimage2.jpg" alt="Image 2"></div>
      <div class="slide"><img src="iimage3.jpg" alt="Image 3"></div>
      <button class="prev" data-carousel="carousel1">&lt;</button>
      <button class="next" data-carousel="carousel1">&gt;</button>
    </div>

    <div class="info1">
      1階にあるお店です。お店の大きさも大きく、様々な商品が揃っております。駅からも近いので1度寄ってみてはいかがでしょうか。
    </div>
  </div>

  <!-- Shop 2 Section -->
  <div class="big_shop2">
    <div class="shop2">
      <h2>駿河屋</h2>
    </div>

    <div class="carousel" id="carousel2">
      <div class="slide active"><img src="iiimage1.jpg" alt="Image 1"></div>
      <div class="slide"><img src="iiimage2.jpg" alt="Image 2"></div>
      <div class="slide"><img src="iiimage3.jpg" alt="Image 3"></div>
      <button class="prev" data-carousel="carousel2">&lt;</button>
      <button class="next" data-carousel="carousel2">&gt;</button>
    </div>

    <div class="info2">
      3階にあるお店です。プラモデルやフィギュア、ゲームカセットの中古品の品揃えが充実しています。もしかしたらいい掘り出し物があるかも‼
    </div>
  </div>

  <!-- Table-like section for info3 -->
  <div class="info3">
    <table>
      <tr>
        <td><span class="address">住所</span>〒274-0825 千葉県船橋市前原西2丁目19-1</td>
      </tr>
      <tr>
        <td><span class="hours">営業時間</span>年中無休 10:00〜20:00</td>
      </tr>
    </table>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="part1.html">①西側</a>
      <a href="part2.html">②東側</a>
      <a href="part3.html">③南側</a>
      <a href="part4.html">④北側</a>
    </div>
    <span class="letter">©松田研究室 B班</span>
  </div>

  <script>
    // Carousel handling function
    function setupCarousel(carouselId) {
      let currentSlide = 0;
      const carousel = document.getElementById(carouselId);
      const slides = carousel.querySelectorAll('.slide');
      const totalSlides = slides.length;

      function showSlide(index) {
        slides.forEach(slide => slide.classList.remove('active'));
        slides[index].classList.add('active');
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
      }

      function prevSlide() {
        currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
        showSlide(currentSlide);
      }

      carousel.querySelector('.next').addEventListener('click', nextSlide);
      carousel.querySelector('.prev').addEventListener('click', prevSlide);
    }

    // Initialize both carousels
    setupCarousel('carousel1');
    setupCarousel('carousel2');
  </script>
</body>

</html>
