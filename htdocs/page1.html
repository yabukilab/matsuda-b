<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Magazine Layout</title>

    <link rel="stylesheet" href="main.css">

</head>

<body>

    <div class="container">

        <!-- First Section -->

        <div class="section">

            <div class="section-left">

                <img src="acai-bowl.jpg" alt="Acai Bowl">

            </div>

            <div class="section-right">

                <h2>店の名前　〇〇〇〇</h2>

                <p>Category: Acai</p>

                <p>アサイボールも大人気! サーファーにもおすすめの場所です。スーパーフードとして人気のアサイは、ブラジルのサンゴの植物から採れる栄養の果実です。</p>

                <p>Swami's Cafe<br>千葉県習志野市谷津7-7-1</p>

            </div>

        </div>




        <!-- Second Section -->

        <div class="section">

            <div class="section-left">

                <img src="clam-chowder.jpg" alt="Clam Chowder in a Bread Bowl">

            </div>

            <div class="section-right">

                <h2>SF / PIER 39</h2>

                <p>Category: Chowder Bowl</p>

                <p>サワードープレートも楽しめる、ブレッドボウル定番メニュー。</p>

                <p>SF Pier 39<br>Beach Street & The Embarcadero, San Francisco, CA 94133</p>

            </div>

        </div>

    </div>

</body>




</html>
